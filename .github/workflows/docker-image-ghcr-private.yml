name: Publish Docker image (GHCR private)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional custom image tag, for example 20260427-1"
        required: false
        type: string
      publish_latest:
        description: "Also update latest tag"
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Normalize image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Derive tags
        id: vars
        shell: bash
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          TAGS="${REGISTRY}/${IMAGE_NAME}:sha-${SHORT_SHA}"
          APP_VERSION="sha-${SHORT_SHA}"

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAGS="${TAGS}"$'\n'"${REGISTRY}/${IMAGE_NAME}:latest"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.image_tag }}" ]]; then
              TAGS="${TAGS}"$'\n'"${REGISTRY}/${IMAGE_NAME}:${{ inputs.image_tag }}"
              APP_VERSION="${{ inputs.image_tag }}"
            fi
            if [[ "${{ inputs.publish_latest }}" == "true" ]]; then
              TAGS="${TAGS}"$'\n'"${REGISTRY}/${IMAGE_NAME}:latest"
            fi
          fi

          {
            echo "short_sha=${SHORT_SHA}"
            echo "app_version=${APP_VERSION}"
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.app_version }}
          tags: ${{ steps.vars.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Publish summary
        run: |
          {
            echo "### Published image"
            echo
            echo '```'
            echo "${{ steps.vars.outputs.tags }}"
            echo '```'
            echo
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
