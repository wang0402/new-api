name: Publish Docker image (GHCR private)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional custom image tag, for example 20260427-1"
        required: false
        type: string
      publish_latest:
        description: "Also update latest tag"
        required: false
        default: true
        type: boolean
      deploy_to_server:
        description: "Deploy to server after image push"
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push multi-arch image
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.vars.outputs.app_version }}
      image_ref: ${{ steps.vars.outputs.image_ref }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Normalize image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Derive tags
        id: vars
        shell: bash
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          TAGS="${REGISTRY}/${IMAGE_NAME}:sha-${SHORT_SHA}"
          APP_VERSION="sha-${SHORT_SHA}"

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAGS="${TAGS}"$'\n'"${REGISTRY}/${IMAGE_NAME}:latest"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.image_tag }}" ]]; then
              TAGS="${TAGS}"$'\n'"${REGISTRY}/${IMAGE_NAME}:${{ inputs.image_tag }}"
              APP_VERSION="${{ inputs.image_tag }}"
            fi
            if [[ "${{ inputs.publish_latest }}" == "true" ]]; then
              TAGS="${TAGS}"$'\n'"${REGISTRY}/${IMAGE_NAME}:latest"
            fi
          fi

          {
            echo "short_sha=${SHORT_SHA}"
            echo "app_version=${APP_VERSION}"
            echo "image_ref=${REGISTRY}/${IMAGE_NAME}:${APP_VERSION}"
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.app_version }}
          tags: ${{ steps.vars.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Publish summary
        run: |
          {
            echo "### Published image"
            echo
            echo '```'
            echo "${{ steps.vars.outputs.tags }}"
            echo '```'
            echo
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-to-server:
    name: Deploy image to server
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: |
      vars.AUTO_DEPLOY_ENABLED == 'true' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy_to_server == true)
      )

    steps:
      - name: Deploy via SSH
        shell: bash
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
          SERVER_DEPLOY_DIR: ${{ vars.SERVER_DEPLOY_DIR }}
          SERVER_GHCR_TOKEN: ${{ secrets.SERVER_GHCR_TOKEN }}
          SERVER_GHCR_USERNAME: ${{ vars.SERVER_GHCR_USERNAME || github.repository_owner }}
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_PORT: ${{ vars.SERVER_PORT || '22' }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_USER: ${{ vars.SERVER_USER }}
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/new-api-deploy-key
          chmod 600 ~/.ssh/new-api-deploy-key

          ssh \
            -i ~/.ssh/new-api-deploy-key \
            -p "${SERVER_PORT}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            "${SERVER_USER}@${SERVER_HOST}" \
            sudo bash -s -- "${IMAGE_REF}" "${SERVER_GHCR_TOKEN}" "${SERVER_GHCR_USERNAME}" "${SERVER_DEPLOY_DIR}" <<'DEPLOY'
          set -euo pipefail

          IMAGE_REF="$1"
          SERVER_GHCR_TOKEN="$2"
          SERVER_GHCR_USERNAME="$3"
          SERVER_DEPLOY_DIR="$4"

          cd "${SERVER_DEPLOY_DIR}"

          if [[ ! -f .env ]]; then
            cp .env.example .env
          fi

          if grep -q '^NEW_API_IMAGE=' .env; then
            sed -i "s|^NEW_API_IMAGE=.*|NEW_API_IMAGE=${IMAGE_REF}|" .env
          else
            printf '\nNEW_API_IMAGE=%s\n' "${IMAGE_REF}" >> .env
          fi

          if [[ -n "${SERVER_GHCR_TOKEN}" ]]; then
            echo "${SERVER_GHCR_TOKEN}" | docker login ghcr.io -u "${SERVER_GHCR_USERNAME}" --password-stdin
          else
            echo "SERVER_GHCR_TOKEN is not set; using existing Docker registry login on the server."
          fi

          ./up-image.sh

          docker ps --filter name=new-api
          . ./.env
          curl -fsS "http://127.0.0.1:${NEW_API_PORT:-3001}/api/status" || true
          DEPLOY
