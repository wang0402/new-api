services:
  new-api:
    image: calciumion/new-api:${NEW_API_VERSION:-latest}
    container_name: new-api
    restart: unless-stopped
    command: --log-dir /app/logs
    ports:
      - "${NEW_API_BIND_ADDRESS:-127.0.0.1}:${NEW_API_PORT:-3001}:${NEW_API_PORT:-3001}"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      STREAMING_TIMEOUT: ${STREAMING_TIMEOUT:-300}
      PORT: ${NEW_API_PORT:-3001}
      SQL_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_CONN_STRING: redis://:${REDIS_PASSWORD}@redis:6379/0
      CRYPTO_SECRET: ${CRYPTO_SECRET}
      ERROR_LOG_ENABLED: ${ERROR_LOG_ENABLED:-true}
      NODE_NAME: ${NODE_NAME:-new-api-node-1}
      TZ: ${TZ:-Asia/Shanghai}
      TLS_INSECURE_SKIP_VERIFY: ${TLS_INSECURE_SKIP_VERIFY:-false}
      GIN_MODE: ${GIN_MODE:-release}
      BATCH_UPDATE_ENABLED: ${BATCH_UPDATE_ENABLED:-true}
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      - postgres
      - redis
    networks:
      new-api-network:
        ipv4_address: 172.19.0.4
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3001/api/status | grep -q '\"success\":true' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      new-api-network:
        ipv4_address: 172.19.0.2

  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      new-api-network:
        ipv4_address: 172.19.0.3

volumes:
  redis_data:
  pg_data:

networks:
  new-api-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.19.0.0/16
