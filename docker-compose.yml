# Production-oriented Docker Compose template.
# 1. Copy `.env.example` to `.env`
# 2. Fill in strong secrets and passwords
# 3. Start with `docker compose up -d`

services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: unless-stopped
    command: --log-dir /app/logs
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:${APP_PORT:-3000}:${APP_PORT:-3000}"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      PORT: ${APP_PORT:-3000}
      TZ: ${TZ:-Asia/Shanghai}
      GIN_MODE: release
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      CRYPTO_SECRET: ${CRYPTO_SECRET:?set CRYPTO_SECRET in .env}
      SQL_DSN: postgresql://${POSTGRES_USER:?set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-new-api}
      REDIS_CONN_STRING: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}@redis:6379/0
      ERROR_LOG_ENABLED: ${ERROR_LOG_ENABLED:-true}
      BATCH_UPDATE_ENABLED: ${BATCH_UPDATE_ENABLED:-true}
      NODE_NAME: ${NODE_NAME:-new-api-node-1}
      STREAMING_TIMEOUT: ${STREAMING_TIMEOUT:-300}
      TLS_INSECURE_SKIP_VERIFY: ${TLS_INSECURE_SKIP_VERIFY:-false}
    depends_on:
      - redis
      - postgres
    networks:
      - new-api-network
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          wget -q -O - http://localhost:${APP_PORT:-3000}/api/status | grep -q '"success":true' || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}"]
    volumes:
      - redis_data:/data
    networks:
      - new-api-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-new-api}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network

volumes:
  pg_data:
  redis_data:

networks:
  new-api-network:
    driver: bridge
